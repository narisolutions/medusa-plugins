name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'yarn'

      - run: yarn install --frozen-lockfile

      - run: yarn workspace @narisolutions/medusa-plugin-pos build

      - run: yarn workspace @narisolutions/medusa-plugin-pos test

      - name: Publish to npm
        run: npm publish --access public
        working-directory: plugins/medusa-plugin-pos
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
